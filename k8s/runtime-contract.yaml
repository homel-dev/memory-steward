apiVersion: v1
kind: ConfigMap
metadata:
  name: homel-runtime-contract
  namespace: homel
data:
  QDRANT_URL: "http://qdrant:6333"
  EMBEDDINGS_URL: "http://embeddings:8000"
  #BUILDER_BASE_URL: "http://vllm-builder:8000/v1"
  BUILDER_BASE_URL: "https://api.openai.com/v1"
  STEWARD_URL: "http://memory-steward:8090"
  MCP_URL: "http://memory-steward-mcp:8081/mcp"
  MAX_CONTEXT_TOKENS: "128000"

  QDRANT_COLLECTION: "homel_memory"

  # Optional router knobs (safe defaults)
  RECENCY_HALF_LIFE_SECONDS: "604800"
  DENSE_PREFETCH: "25"
  TOP_K: "8"

  # Steward knobs (defaults)
  MIN_CONFIDENCE: "0.7"

  STATIC_MEMORY_REFRESH_SECONDS: "1800"
  HYSTERESIS_WINDOW: "8"
