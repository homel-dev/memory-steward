apiVersion: v1
kind: Service
metadata:
  name: memory-steward
  namespace: homel
spec:
  selector:
    app: memory-steward
  ports:
    - port: 8090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-steward
  namespace: homel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memory-steward
  template:
    metadata:
      labels:
        app: memory-steward
    spec:
      containers:
        - name: steward
          image:  ghcr.io/homel-dev/memory-steward/memory-steward:0.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
          envFrom:
            - configMapRef:
                name: homel-runtime-contract
            - secretRef:
                name: homel-postgres
          env:
            - name: STEWARD_MODEL
              value: "Qwen/Qwen2.5-32B-Instruct-AWQ"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 5
