apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: memory-steward-ingress
  namespace: homel
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - secretName: memory-steward-tls
  rules:
    - http:
        paths:
          - path: /v1/list
            pathType: Prefix
            backend:
              service:
                name: memory-steward-list
                port:
                  number: 8001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 8080
