apiVersion: v1
kind: Service
metadata:
  name: embeddings
  namespace: homel
spec:
  selector:
    app: embeddings
  ports:
    - port: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embeddings
  namespace: homel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embeddings
  template:
    metadata:
      labels:
        app: embeddings
    spec:
      containers:
        - name: embeddings
          image:  ghcr.io/homel-dev/memory-steward/embeddings:0.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_NAME
              value: BAAI/bge-small-en-v1.5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
