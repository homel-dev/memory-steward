apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: homel
data:
  router-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "postgres", "uid": "homel-postgres" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "format": "time_series",
              "rawSql": "SELECT minute AS time, requests AS value FROM telemetry.v_router_rps WHERE $__timeFilter(minute) ORDER BY 1",
              "refId": "A"
            }
          ],
          "title": "Router Requests per Minute",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "postgres", "uid": "homel-postgres" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "format": "time_series",
              "rawSql": "SELECT minute AS time, errors::float / NULLIF(total,0) AS value FROM telemetry.v_router_errors WHERE $__timeFilter(minute) ORDER BY 1",
              "refId": "A"
            }
          ],
          "title": "Router Error Rate",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "postgres", "uid": "homel-postgres" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 8 },
          "id": 3,
          "options": { "showHeader": true },
          "targets": [
            {
              "format": "table",
              "rawSql": "SELECT created_at, project_id, request_id, model_requested, model_sent_to_builder, http_status, error_kind FROM telemetry.request WHERE $__timeFilter(created_at) ORDER BY created_at DESC LIMIT 50",
              "refId": "A"
            }
          ],
          "title": "Recent Router Requests",
          "type": "table"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["homel", "router"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "homel — Router Overview",
      "uid": "homel-router-overview",
      "version": 1
    }

  steward-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "postgres", "uid": "homel-postgres" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 10,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "format": "time_series",
              "rawSql": "SELECT date_trunc('minute', created_at) AS time, count(*) AS value FROM telemetry.admission WHERE $__timeFilter(created_at) GROUP BY 1 ORDER BY 1",
              "refId": "A"
            }
          ],
          "title": "Steward Admissions per Minute",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "postgres", "uid": "homel-postgres" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 11,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "format": "time_series",
              "rawSql": "SELECT date_trunc('minute', created_at) AS time, avg(fragments_inserted) AS value FROM telemetry.admission WHERE $__timeFilter(created_at) GROUP BY 1 ORDER BY 1",
              "refId": "A"
            }
          ],
          "title": "Avg Fragments Inserted",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "postgres", "uid": "homel-postgres" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 8 },
          "id": 12,
          "options": { "showHeader": true },
          "targets": [
            {
              "format": "table",
              "rawSql": "SELECT created_at, project_id, request_id, fragments_extracted, fragments_inserted, qdrant_upserts, ok, error_detail FROM telemetry.admission WHERE $__timeFilter(created_at) ORDER BY created_at DESC LIMIT 50",
              "refId": "A"
            }
          ],
          "title": "Recent Admissions",
          "type": "table"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["homel", "steward"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "homel — Steward Overview",
      "uid": "homel-steward-overview",
      "version": 1
    }

