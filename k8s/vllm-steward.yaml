apiVersion: v1
kind: Service
metadata:
  name: vllm-steward
  namespace: homel
spec:
  selector:
    app: vllm-steward
  ports:
    - port: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-steward
  namespace: homel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-steward
  template:
    metadata:
      labels:
        app: vllm-steward
    spec:
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-cache
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args:
            - Qwen/Qwen2.5-32B-Instruct-AWQ
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --max-model-len
            - "4096"
            - --gpu-memory-utilization
            - "0.9"
            - --max-num-seqs
            - "16"
          env:
            - name: HF_HOME
              value: /root/.cache/huggingface
            - name: HUGGINGFACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
            - name: NVIDIA_VISIBLE_DEVICES
              value: "1"
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
          ports:
            - containerPort: 8000
