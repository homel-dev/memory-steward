name: Build & Publish images to GHCR (amd64 & arm64)

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

on:
  release:
    types: [published]
  workflow_dispatch: {}
  push:
    branches: ["main"]
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    name: Build & push (${{ matrix.component }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: embeddings
            context: ./components/embeddings
            dockerfile: ./components/embeddings/Dockerfile
          - component: memory-router
            context: ./components/memory_router
            dockerfile: ./components/memory_router/Dockerfile
          - component: memory-steward
            context: ./components/memory_steward
            dockerfile: ./components/memory_steward/Dockerfile
          - component: memory-steward-mcp
            context: ./components/memory_steward_mcp
            dockerfile: ./components/memory_steward_mcp/Dockerfile
          - component: memory-steward-list
            context: ./components/memory_steward_list
            dockerfile: ./components/memory_steward_list/Dockerfile

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: v0.22.0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/${{ matrix.component }}
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

